name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Show Java version
        run: java -version

      # Build БЕЗ тестов
      - name: Build project
        run: mvn clean package -DskipTests

      # запуск тестов
      - name: Run unit tests
        run: mvn test
